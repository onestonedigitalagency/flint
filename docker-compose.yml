services:
  db:
    image: mysql:8.0
    container_name: flint_mysql
    restart: always
    environment:
      MYSQL_DATABASE: agent_deploy
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: flint_user
      MYSQL_PASSWORD: flint_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
